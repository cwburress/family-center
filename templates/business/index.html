<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Center</title>
    <style>
        body { 
            background-color: #808080; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            text-shadow: 0 0 4px #000, 0 0 10px #000, 0 0 15px #000;
        }
    </style>
</head>
<body>
    <div>
        <h2>Upcoming Events</h2>
        <ul>
            {% for event in events %}
                {% set start = event.start.get('dateTime', event.start.get('date')) %}
                <li><strong>{{ event.summary }}</strong><br> {{ start }}</li>
            {% else %}
                <li>No upcoming events found.</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
